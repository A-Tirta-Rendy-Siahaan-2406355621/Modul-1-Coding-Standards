<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create New Car</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>

<div class="container my-4">
    <h3>Create New Car</h3>

    <form th:action="@{/car/create}" th:object="${car}" method="post">
        <div class="form-group">
            <label for="nameInput">Name</label>
            <input th:field="*{carName}" type="text" class="form-control mb-3 col-4"
                   id="nameInput" placeholder="Enter car name" required>
        </div>

        <div class="form-group">
            <label for="colorInput">Color</label>
            <input th:field="*{carColor}" type="text" class="form-control mb-3 col-4"
                   id="colorInput" placeholder="Enter car color" required>
        </div>

        <div class="form-group">
            <label for="quantityInput">Quantity</label>
            <input th:field="*{carQuantity}" type="number" class="form-control mb-3 col-4"
                   id="quantityInput" placeholder="Enter car quantity" required>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
        <a th:href="@{/car/list}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

</body>
</html>
